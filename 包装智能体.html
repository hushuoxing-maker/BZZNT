<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>包装设计智能体 | 八组完整方案 · 全系统保留 V10.0</title>
    <style>
        :root {

        }
        * { margin:0; padding:0; box-sizing:border-box; }
        body { background:#f0ede8; color:var(--text); font-family:var(--font); height:100vh; display:flex; flex-direction:column; overflow:hidden; }

        .header { background:#fff; border-bottom:1px solid var(--border); padding:10px 24px; display:flex; align-items:center; gap:12px; flex-shrink:0; justify-content:center; }
        .header .logo { width:34px; height:34px; border-radius:7px; background:linear-gradient(145deg,#d4ba8a,#a8853f); color:#fff; font-weight:700; font-size:17px; display:flex; align-items:center; justify-content:center; }
        .header .title { font-weight:600; font-size:14px; letter-spacing:0.05em; }
        .badge { font-size:9px; background:var(--gold-light); color:var(--accent2); padding:4px 10px; border-radius:20px; border:1px solid #e5d5b8; }
        .main-symmetric { display:flex; flex:1; overflow:hidden; position:relative; }
        .main-symmetric::before { content:''; position:absolute; left:50%; top:0; bottom:0; width:1px; background:linear-gradient(to bottom,transparent,#d9d2c7,transparent); z-index:1; pointer-events:none; }
        .panel-left,.panel-right { width:50%; display:flex; flex-direction:column; overflow:hidden; background:#faf9f7; }
        .panel-right { background:#fdfcf9; }
        .panel-header { padding:8px 16px; border-bottom:1px solid var(--border); background:#fdfcf9; flex-shrink:0; display:flex; align-items:center; gap:8px; font-size:12px; font-weight:600; }
        .panel-body { flex:1; overflow-y:auto; padding:8px 12px; display:flex; flex-direction:column; }
        .brand-input-row { display:flex; align-items:center; gap:8px; padding:7px 10px; background:#fdfcf9; border:1px solid var(--border); border-radius:var(--radius-sm); margin-bottom:6px; flex-shrink:0; }
        .brand-input-row input { flex:1; padding:6px 10px; border:1px solid var(--border); background:var(--input-bg); border-radius:4px; font-size:11px; }
        .btn-add-brand { padding:6px 12px; background:var(--accent); color:#fff; border:none; border-radius:14px; cursor:pointer; font-size:10px; font-weight:500; }
        .left-inner { display:flex; flex:1; overflow:hidden; }
        .left-sidebar-cats { width:155px; flex-shrink:0; overflow-y:auto; border-right:1px solid #f0ece5; background:#fdfcf9; padding:2px 0; }
        .left-sidebar-cats .cat-btn { display:flex; align-items:center; gap:6px; width:100%; padding:7px 10px; border:none; background:transparent; color:var(--text2); font-size:10.5px; cursor:pointer; text-align:left; font-family:var(--font-cn); border-left:2px solid transparent; white-space:nowrap; }
        .left-sidebar-cats .cat-btn.active { background:#fdf8f0; color:var(--accent2); border-left-color:var(--accent); font-weight:600; }
        .left-subcat-area { flex:1; overflow-y:auto; padding:8px 10px; }
        .group-label { font-size:9px; color:#b5ada0; letter-spacing:0.05em; margin:5px 0 2px; text-transform:uppercase; }
        .subcat-btn { display:inline-block; padding:5px 11px; margin:2px 2px; border:1px solid var(--border); background:var(--btn-bg); color:#5c554a; border-radius:16px; cursor:pointer; font-size:10.5px; font-family:var(--font-cn); transition:0.2s; }
        .subcat-btn.selected { background:#fef9f0; border-color:var(--accent); color:var(--accent2); font-weight:500; }
        .color-swatch { display:inline-block; width:14px; height:14px; border-radius:3px; margin-right:4px; vertical-align:middle; border:1px solid #ddd; }
        .right-top-tags { padding:8px 12px; border-bottom:1px solid var(--border); background:#fefdfa; flex-shrink:0; min-height:38px; display:flex; flex-wrap:wrap; gap:4px; align-items:center; }
        .selected-tag-pill { display:inline-flex; align-items:center; gap:3px; padding:3px 9px; background:#fdf8f0; border:1px solid #e5d5b8; border-radius:12px; font-size:9.5px; color:var(--accent2); cursor:pointer; }

        .btn-generate { padding:8px 18px; background:linear-gradient(135deg,#c9a96e,#a8853f); color:#fff; border:none; border-radius:18px; cursor:pointer; font-weight:600; font-size:11px; box-shadow:0 3px 10px rgba(168,133,63,0.25); }

        .prompt-card { background:#fefdfa; border:1px solid #ece7dd; border-radius:var(--radius-sm); margin-bottom:6px; }
        .prompt-card summary { display:flex; align-items:center; gap:8px; padding:8px 10px; cursor:pointer; list-style:none; font-size:11px; font-weight:500; }
        .prompt-card .p-num { font-weight:700; font-size:18px; color:#d5ccbb; min-width:24px; text-align:center; }
        .prompt-content { padding:6px 10px 10px 40px; font-size:10px; line-height:1.6; color:#5c554a; border-top:1px solid #f5f1ea; }
        .prompt-section { margin-bottom:5px; padding:5px 7px; background:#fdfcf9; border-radius:4px; border:1px dashed #e8e2d5; }
        .prompt-section .section-label { font-size:9px; font-weight:700; color:var(--accent2); letter-spacing:0.05em; margin-bottom:2px; }
        .btn-copy-small { display:inline-block; margin-top:2px; padding:3px 8px; background:#faf7f2; border:1px solid #e5dfd5; border-radius:8px; cursor:pointer; font-size:8.5px; color:#8b8275; transition:0.2s; margin-right:3px; }

        .btn-copy-small.copied { background:#e8f5e9; border-color:#a5d6a7; color:#2e7d32; }
        .toast { position:fixed; top:20px; left:50%; transform:translateX(-50%); background:#3a3530; color:#f5efe5; padding:8px 20px; border-radius:20px; font-size:11px; z-index:999; opacity:0; transition:opacity 0.35s; pointer-events:none; }

        @media (max-width:900px) { .main-symmetric { flex-direction:column; } .panel-left,.panel-right { width:100%; max-height:48%; } }

            if(industryStr.includes('化妆')||industryStr.includes('护肤')||industryStr.includes('美妆')||industryStr.includes('香水')||industryStr.includes('精华')||industryStr.includes('面膜')) return '强化高级轻奢感：镜面金属材质、电镀渐变工艺、极简无衬线字体、高透玻璃质感、磁吸开合仪式感';

            if(industryStr.includes('电子')||industryStr.includes('数码')||industryStr.includes('手机')||industryStr.includes('耳机')||industryStr.includes('智能')) return '强化科技感与结构逻辑：精密几何结构、镭射全息表面、深空灰科技蓝配色、模块化内托设计、NFC智能交互';
            if(industryStr.includes('酒')||industryStr.includes('白酒')||industryStr.includes('红酒')||industryStr.includes('洋酒')) return '强化高端收藏价值：深色木纹质感、金属铭牌logo、皮质拎手设计、内衬丝绸材质、限量编号标识';
            if(industryStr.includes('珠宝')||industryStr.includes('首饰')||industryStr.includes('钟表')) return '强化奢华展示感：超白玻璃展示窗、LED灯带内置、磁悬浮展示结构、天鹅绒内衬、镜面不锈钢材质';
            return '强化通用高端包装特征：精致工艺细节、多层结构设计、优质材质表现、品牌视觉一致性';
        }

        function generateFullProposal(){
            if(!Object.keys(selectedTags).length){ showToast('请先选择标签'); return; }
            const grouped = {};
            Object.keys(selectedTags).forEach(k=>{ const v=selectedTags[k]; if(v.catName==='品牌信息') return; if(!grouped[v.catName]) grouped[v.catName]=[]; grouped[v.catName].push(v.item); });
            const currentBrand = getBrandName();
            const get = (cats) => cats?.join('、') || '';
            const industry = get(grouped['行业包装分类']) || '高端消费品';
            const industryEnhance = getIndustryEnhancement(industry);
            generatedProposals = designConcepts.map((c,i)=>{
                const eco = ['碳足迹标签+盲文压印','全成分透明窗+数字水印','NFC触碰区+产品溯源二维码','大豆油墨+水性涂层'][i%4];
                const brandPrefix = currentBrand ? `【品牌】${currentBrand}；` : '';
                const structure = c.structure || get(grouped['包装结构系统']) || '天地盖盒';
                const material = c.material || get(grouped['包装材质系统']) || 'FSC认证纸';
                const craft = get(grouped['包装工艺系统']) || '烫金+压纹+UV';
                const style = get(grouped['包装风格系统']) || '极简轻奢';
                const color = get(grouped['包装颜色系统']) || '黑金';
                const position = get(grouped['消费定位系统']) || '高端礼赠型';
                const bleed = get(grouped['出血系统']) || '3mm出血';
                const greyboard = get(grouped['灰板厚度数据库']) || '1200g灰板';
                const aiElements = get(grouped['AI提示词要素']) || '多视图陈列+8K超高清+C4D渲染';
                const unfoldType = c.unfold || get(grouped['包装展开图系统']) || '卡盒六面展开图';
                const knifeType = c.knife || get(grouped['包装刀模图系统']) || '外轮廓刀线+折叠线+压痕线';
                const imposition = get(grouped['包装拼版系统']) || '专版拼版';
                const dimensions = get(grouped['包装尺寸标注系统']) || '总长、总宽、总高、展开尺寸';
                const fonts = get(grouped['包装字体系统']) || '现代黑体';
                const psychology = get(grouped['心理感受系统']) || '高级感+品质感';

                const section1 = `包装设计提案主视觉效果图，专业产品摄影级多视图陈列，构图包含正面主视图（居中C位占比45%）、45°俯视立体视角（右侧占比30%）、侧面结构展示（左侧占比25%），高档影棚纯色微水泥台面，三视图整齐排列，柔和投影与精准高光，${aiElements}——${brandPrefix}【概念】${c.name}：${c.feature}；【行业】${industry}；【结构】${structure}；【材质】${material}；【工艺】${craft}；【风格】${style}；【色彩】${color}；【字体】${fonts}；【心理感受】${psychology}；【定位】${position}；【环保】${eco}；【行业强化】${industryEnhance}——高品质产品摄影布光，柔光箱加侧逆光，空气感微尘，博物馆级展陈质感，极致细节，商业广告大片风格，包装设计获奖作品级画面。`;
                const section2 = `包装六面展开图，${unfoldType}，包装刀版图完整结构，正面、背面、左侧面、右侧面、顶部、底部六面完整展示，印刷文件标准结构，高清矢量表现，白色背景，黑色刀线清晰锐利，包含${knifeType}，标注${dimensions}，${bleed}出血线、安全线，${greyboard}灰板厚度标识，${imposition}拼版方式示意图，可直接用于包装设计排版参考，工程图级别精度，8K超高清。`;
                const section3 = `包装对称结构展示图，${structure}正反面对称展示，左右面对称展示，顶部与底部对应关系展示，结构分解图，包装比例分析图，包装空间关系图，包装结构说明图，轴测投影角度45°，${material}材质表现，半透明显示内部层次关系，${dimensions}尺寸标注清晰，C4D渲染，Octane渲染器，8K超高清，工程制图与产品摄影混合风格。`;
                const section4 = `包装爆炸图，${structure}组件拆解图，外盒、内托、说明书、标签、产品主体、配件分层展示，爆炸结构图，工业设计表达方式，产品包装系统展示，各组件间距均匀排列，${material}材质真实表现，爆炸方向沿Z轴向上分层，轴测投影60°视角，C4D渲染，Octane渲染器，8K超高清，白色背景，适合产品包装结构说明。`;
                const section5 = `包装刀版工程图，${structure}生产制造标准格式，包装尺寸标注完整，折线（绿色虚线）、裁切线（红色实线）、出血线（蓝色点划线）、压痕线（黄色虚线）、锁扣结构、粘贴区域（灰色填充）清晰区分，${bleed}出血区域明确标示，${greyboard}灰板截面可见，${imposition}拼版方式示意，工程制图规范，印刷厂生产标准格式，俯视正投影视图，矢量图风格，8K超高清。`;
                const section6 = `包装组合展示图，${structure}单盒展示、多盒组合展示（3盒、6盒、12盒排列）、系列包装展示、货架陈列效果图、品牌矩阵展示图、终端销售场景展示图，${style}风格统一，${color}色彩系统贯穿，商业广告级渲染，真实光影，摄影棚布光，C4D渲染，Octane渲染器，8K超高清。`;
                const section7 = `包装材质工艺展示图，${material}材质特写，${craft}工艺细节展示，烫金/烫银反光质感、UV/局部UV光泽对比、压纹/击凸/击凹立体细节、镭射全息效果、金属油墨光泽、磨砂膜哑光质感、亮膜高光反射、特种纸纹理特写，微距摄影级别，侧光强调表面起伏，8K超高清，产品级精修。`;
                const section8 = `包装尺寸比例图，${structure}${dimensions}标注清晰，人手持包装比例参考（1:1真实比例），产品与包装比例关系图，运输包装尺寸关系图，货架陈列比例关系图，${greyboard}灰板厚度标注，内尺寸与外尺寸对比标注，工程制图风格，白色背景，尺寸线清晰，8K超高清，适合结构分析使用。`;

                return {
                    conceptName: (currentBrand ? currentBrand + ' · ' : '') + c.name,
                    sections: [
                        { label: '📸 第一组：包装主视觉效果图', prompt: section1 },
                        { label: '📐 第二组：包装六面展开图', prompt: section2 },
                        { label: '🔄 第三组：包装对称结构展示图', prompt: section3 },
                        { label: '💥 第四组：包装爆炸图', prompt: section4 },
                        { label: '🗡️ 第五组：包装刀版工程图', prompt: section5 },
                        { label: '🧩 第六组：包装组合展示图', prompt: section6 },
                        { label: '🔍 第七组：包装材质工艺展示图', prompt: section7 },
                        { label: '📏 第八组：包装尺寸比例图', prompt: section8 }
                    ],
                    index: i
                };
            });
            updatePromptsDisplay();
            showToast('✅ 已生成20组完整展示方案（每组含八张图，全系统文字保留）！');
            document.getElementById('promptsScrollArea').scrollTop = 0;
        }

        function copyText(text, btn, type){
            const decoded = text.replace(/&#39;/g,"'").replace(/&quot;/g,'"').replace(/\\`/g,'`');
            navigator.clipboard?.writeText(decoded).then(()=>{
                btn.classList.add('copied'); btn.textContent = '✅ 已复制';
                setTimeout(()=>{ btn.classList.remove('copied'); btn.textContent = '📋 复制此组'; },1800);
                showToast('📋 已复制到剪贴板');
            }).catch(()=>{
                const ta = document.createElement('textarea'); ta.value = decoded; document.body.appendChild(ta); ta.select(); document.execCommand('copy'); document.body.removeChild(ta);
                showToast('📋 已复制');
            });
        }
        function showToast(msg){ const toast=document.getElementById('toast'); toast.textContent=msg; toast.classList.add('show'); clearTimeout(toast._timeout); toast._timeout=setTimeout(()=>toast.classList.remove('show'),2000); }
        init();
        renderSubcategories('行业包装分类');
    </script>
