<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <style>
        :root {
            --bg: #f6f4f0;
            --panel: #ffffff;
            --card: #fdfcf9;
            --border: #e5e0d9;
            --border2: #d9d2c7;
            --text: #2b2a27;
            --text2: #6b6358;
            --text3: #9b9285;
            --accent: #b8945a;
            --accent2: #8b6f3f;
            --gold: #c9a96e;
            --gold-light: #f5efe5;
            --tag-bg: #f8f4ed;
            --btn-bg: #faf7f2;
            --btn-hover: #f0ebe0;
            --input-bg: #fdfcf9;
            --shadow-sm: 0 1px 2px rgba(0, 0, 0, 0.04);
            --shadow-md: 0 3px 16px rgba(0, 0, 0, 0.06);
            --radius-sm: 5px;
            --radius: 8px;
            --transition: 0.22s;
            --font: 'Inter', 'PingFang SC', 'Microsoft YaHei', sans-serif;
            --font-cn: 'PingFang SC', 'Noto Serif SC', 'Microsoft YaHei', 'STSong', sans-serif;
        }
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            background: #f0ede8;
            color: var(--text);
            font-family: var(--font);
            height: 100vh;
            display: flex;
            flex-direction: column;
            overflow: hidden;
            letter-spacing: 0.01em;
            background-image: radial-gradient(ellipse at 50% 0%, rgba(201, 169, 110, 0.04) 0%, transparent 70%);
        }
        ::-webkit-scrollbar {
            width: 5px;
            height: 5px;
        }
        ::-webkit-scrollbar-track {
            background: transparent;
        }
        ::-webkit-scrollbar-thumb {
            background: #d5cfc5;
            border-radius: 4px;
        }
        .header {
            background: var(--panel);
            border-bottom: 1px solid var(--border);
            padding: 11px 28px;
            display: flex;
            align-items: center;
            gap: 14px;
            flex-shrink: 0;
            z-index: 20;
            box-shadow: var(--shadow-sm);
            justify-content: center;
        }
        .header .logo-mark {
            width: 34px;
            height: 34px;
            border-radius: 7px;
            background: linear-gradient(145deg, #d4ba8a, #a8853f);
            color: #fff;
            font-weight: 700;
            font-size: 17px;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .header .brand-text {
            font-weight: 600;
            font-size: 15px;
            letter-spacing: 0.06em;
        }
        .header .badge {
            font-size: 9px;
            background: var(--gold-light);
            color: var(--accent2);
            padding: 5px 12px;
            border-radius: 20px;
            border: 1px solid #e5d5b8;
        }
        .main-symmetric {
            display: flex;
            flex: 1;
            overflow: hidden;
            position: relative;
        }
        .main-symmetric::before {
            content: '';
            position: absolute;
            left: 50%;
            top: 0;
            bottom: 0;
            width: 1px;
            background: linear-gradient(to bottom, transparent, var(--border2), transparent);
            z-index: 1;
            pointer-events: none;
        }
        .panel-left,
        .panel-right {
            width: 50%;
            display: flex;
            flex-direction: column;
            overflow: hidden;
            background: #faf9f7;
        }
        .panel-right {
            background: #fdfcf9;
        }
        .panel-header {
            padding: 10px 18px;
            border-bottom: 1px solid var(--border);
            background: #fdfcf9;
            flex-shrink: 0;
            display: flex;
            align-items: center;
            gap: 8px;
        }
        .panel-body {
            flex: 1;
            overflow-y: auto;
            padding: 10px 14px;
            display: flex;
            flex-direction: column;
        }
        .brand-input-row {
            display: flex;
            align-items: center;
            gap: 8px;
            padding: 8px 12px;
            background: #fdfcf9;
            border: 1px solid var(--border);
            border-radius: var(--radius-sm);
            margin-bottom: 8px;
            flex-shrink: 0;
        }
        .brand-input-row input {
            flex: 1;
            padding: 7px 10px;
            border: 1px solid var(--border);
            background: var(--input-bg);
            border-radius: 4px;
            font-size: 11.5px;
        }
        .brand-input-row .btn-add-brand {
            padding: 7px 14px;
            background: var(--accent);
            color: #fff;
            border: none;
            border-radius: 16px;
            cursor: pointer;
            font-size: 10.5px;
            font-weight: 500;
        }
        .left-inner {
            display: flex;
            flex: 1;
            overflow: hidden;
            min-height: 0;
        }
        .left-sidebar-cats {
            width: 150px;
            flex-shrink: 0;
            overflow-y: auto;
            border-right: 1px solid #f0ece5;
            padding: 4px 0;
            background: #fdfcf9;
        }
        .left-sidebar-cats .cat-btn {
            display: flex;
            align-items: center;
            gap: 7px;
            width: 100%;
            padding: 8px 11px;
            border: none;
            background: transparent;
            color: var(--text2);
            font-size: 11px;
            cursor: pointer;
            text-align: left;
            font-family: var(--font-cn);
            border-left: 2px solid transparent;
            white-space: nowrap;
        }
        .left-sidebar-cats .cat-btn.active {
            background: #fdf8f0;
            color: var(--accent2);
            border-left-color: var(--accent);
            font-weight: 600;
        }
        .left-subcat-area {
            flex: 1;
            overflow-y: auto;
            padding: 10px 12px;
        }
        .group-label {
            font-size: 10px;
            color: #b5ada0;
            letter-spacing: 0.06em;
            margin: 6px 0 3px;
            text-transform: uppercase;
        }
        .subcat-btn {
            display: inline-block;
            padding: 6px 13px;
            margin: 2px 3px;
            border: 1px solid var(--border);
            background: var(--btn-bg);
            color: #5c554a;
            border-radius: 18px;
            cursor: pointer;
            font-size: 11px;
            font-family: var(--font-cn);
            transition: all var(--transition);
        }
        .subcat-btn.selected {
            background: #fef9f0;
            border-color: var(--accent);
            color: var(--accent2);
            font-weight: 500;
        }
        .color-swatch {
            display: inline-block;
            width: 15px;
            height: 15px;
            border-radius: 3px;
            margin-right: 5px;
            vertical-align: middle;
            border: 1px solid #ddd;
            box-shadow: inset 0 1px 2px rgba(0, 0, 0, 0.08);
        }
        .right-top-tags {
            padding: 10px 14px;
            border-bottom: 1px solid var(--border);
            background: #fefdfa;
            flex-shrink: 0;
            min-height: 44px;
            display: flex;
            flex-wrap: wrap;
            gap: 5px;
            align-items: center;
        }
        .selected-tag-pill {
            display: inline-flex;
            align-items: center;
            gap: 4px;
            padding: 4px 10px;
            background: #fdf8f0;
            border: 1px solid #e5d5b8;
            border-radius: 14px;
            font-size: 10px;
            color: var(--accent2);
            cursor: pointer;
        }
        .brand-tag-special {
            border: 1.5px solid var(--accent);
            background: #fef8ed;
        }
        .btn-generate {
            padding: 9px 20px;
            background: linear-gradient(135deg, #c9a96e, #a8853f);
            color: #fff;
            border: none;
            border-radius: 20px;
            cursor: pointer;
            font-weight: 600;
            font-size: 12px;
            box-shadow: 0 3px 12px rgba(168, 133, 63, 0.25);
        }
        .prompts-scroll-area {
            flex: 1;
            overflow-y: auto;
            padding: 8px 10px;
        }
        .prompt-card {
            background: #fefdfa;
            border: 1px solid #ece7dd;
            border-radius: var(--radius-sm);
            margin-bottom: 7px;
        }
        .prompt-card summary {
            display: flex;
            align-items: center;
            gap: 10px;
            padding: 9px 12px;
            cursor: pointer;
            list-style: none;
        }
        .prompt-card .p-num {
            font-weight: 600;
            font-size: 20px;
            color: #d5ccbb;
            min-width: 28px;
            text-align: center;
        }
        .btn-copy-small {
            padding: 4px 10px;
            background: #faf7f2;
            border: 1px solid #e5dfd5;
            border-radius: 10px;
            cursor: pointer;
            font-size: 9.5px;
        }
        .toast {
            position: fixed;
            top: 20px;
            left: 50%;
            transform: translateX(-50%);
            background: #3a3530;
            color: #f5efe5;
            padding: 9px 22px;
            border-radius: 20px;
            font-size: 11px;
            z-index: 999;
            opacity: 0;
            transition: opacity 0.35s;
        }
        .toast.show {
            opacity: 1;
        }
        @media (max-width: 900px) {
            .main-symmetric {
                flex-direction: column;
            }
            .panel-left,
            .panel-right {
                width: 100%;
                max-height: 48%;
            }
            .left-sidebar-cats {
                width: 100px;
            }
        }
    </style>
</head>

                <div class="left-inner">

        </div>
        <div class="panel-right">

            </div>
        </div>
    </div>
    <div class="toast" id="toast"></div>

        function addBrandTag() {
            const input = document.getElementById('brandNameInput');
            const name = input.value.trim();
            if (!name) { showToast('请输入品牌名称'); return; }
            brandName = name;
            Object.keys(selectedTags).forEach(k => { if (k.startsWith('品牌信息|||')) delete selectedTags[k]; });
            selectedTags['品牌信息|||品牌名|||' + name] = { catName: '品牌信息', groupName: '品牌名', item: name };
            updateRightTags();
            generatedPromptsCache = [];
            updatePromptsDisplay();
            showToast('✅ 品牌名已添加：' + name);
            input.value = name;
        }

        function removeBrandTag() {
            brandName = '';
            document.getElementById('brandNameInput').value = '';
            Object.keys(selectedTags).forEach(k => { if (k.startsWith('品牌信息|||')) delete selectedTags[k]; });
            updateRightTags();
            generatedPromptsCache = [];
            updatePromptsDisplay();

            updatePromptsDisplay();
        }

        function addCustomTag(catName, groupName, value) {
            selectedTags[`${catName}|||${groupName}|||${value}`] = { catName, groupName, item: value };
            updateRightTags();
            generatedPromptsCache = [];
            updatePromptsDisplay();
        }

        function updateRightTags() {
            const container = document.getElementById('rightTopTags');
            const keys = Object.keys(selectedTags);
            document.getElementById('tagCountLabel').textContent = `已选 ${keys.length} 项`;
            if (keys.length === 0) {
                container.innerHTML = '<span style="color:#c5bdb0;font-size:10px;">等待选择…</span>';
            } else {
                container.innerHTML = keys.map(key => {
                    const v = selectedTags[key];
                    const isBrand = v.catName === '品牌信息';
                    const short = isBrand ? '🏷️ ' + v.item : `${v.catName.slice(0,4)}:${v.item}`;
                    return `<span class="selected-tag-pill${isBrand ? ' brand-tag-special' : ''}" onclick="removeTag('${key.replace(/'/g,"\\'")}')">${short}<span style="font-size:9px;opacity:0.5;margin-left:2px;">×</span></span>`;
                }).join('');
            }
        }

        function removeTag(key) {
            if (selectedTags[key]?.catName === '品牌信息') { removeBrandTag(); return; }
            delete selectedTags[key];
            renderSubcategories(activeCategory);
            updateRightTags();
            generatedPromptsCache = [];
            updatePromptsDisplay();
        }

        function clearAllSelections() {
            selectedTags = {};
            brandName = '';
            document.getElementById('brandNameInput').value = '';
            generatedPromptsCache = [];
            renderSubcategories(activeCategory);
            updateRightTags();
            updatePromptsDisplay();
            showToast('已清空全部选择');
        }

        function updatePromptsDisplay() {
            const area = document.getElementById('promptsScrollArea');
            if (!generatedPromptsCache.length) {
                area.innerHTML =
                    '<div style="text-align:center;padding:30px;color:#c5bdb0;"><span style="font-size:40px;">📝</span><br>选择标签后生成</div>';
                return;
            }
            area.innerHTML = generatedPromptsCache.map((p, i) => `
            <details class="prompt-card">
              <summary><span class="p-num">${String(i+1).padStart(2,'0')}</span><span>${p.conceptName}</span></summary>
              <div style="padding:8px 12px 12px 48px;font-size:10.5px;line-height:1.8;">${p.fullPrompt}<br><button class="btn-copy-small" onclick="copySinglePrompt(${i}, this)">📋 复制此条</button></div>
            </details>`).join('');
        }

        function generate20Prompts() {
            if (!Object.keys(selectedTags).length) { showToast('请先选择标签'); return; }
            const grouped = {};
            Object.keys(selectedTags).forEach(k => {
                const v = selectedTags[k];
                if (v.catName === '品牌信息') return;
                if (!grouped[v.catName]) grouped[v.catName] = [];
                grouped[v.catName].push(v.item);
            });
            const currentBrand = getBrandName();
            const get = (cats) => cats?.join('、') || '';
            generatedPromptsCache = designConcepts.map((c, i) => {
                const eco = ['碳足迹标签+盲文压印', '全成分透明窗+数字水印', 'NFC触碰区+溯源二维码', '大豆油墨+水性涂层'][i % 4];
                let prompt = `包装设计提案效果图，专业产品摄影级多视图陈列，构图包含正面主视图（居中C位占比45%）、45°俯视立体视角（右侧占比30%）、侧面结构展示（左侧占比25%），高档影棚纯色微水泥台面，三视图整齐排列，柔和投影与精准高光，8K超高清，C4D渲染，Octane渲染器，产品级精修质感——`;
                if (currentBrand) prompt += `【品牌】${currentBrand}；`;
                prompt += `【概念】${c.name}：${c.feature}；`;
                prompt += `【行业】${get(grouped['行业包装分类']) || '高端消费品'}；`;
                prompt += `【结构】${c.structure || get(grouped['包装结构系统']) || '天地盖盒'}；`;
                prompt += `【材质】${c.material || get(grouped['包装材质系统']) || 'FSC认证纸'}；`;
                prompt += `【工艺】${get(grouped['包装工艺系统']) || '烫金+压纹'}；`;
                prompt += `【风格】${get(grouped['包装风格系统']) || '极简轻奢'}；`;
                prompt += `【色彩】${get(grouped['包装颜色系统']) || '黑金'}；`;
                prompt += `【字体】${get(grouped['包装字体系统']) || '现代黑体'}；`;
                prompt += `【图形】${get(grouped['包装图形系统']) || '品牌LOGO图形'}；`;
                prompt += `【定位】${get(grouped['消费定位系统']) || '高端礼赠型'}；`;
                prompt += `【心理】${get(grouped['心理感受系统']) || '高级感+品质感'}；`;
                prompt += `【环保】${eco}；`;
                if (grouped['尺寸系统']) prompt += `【尺寸】${get(grouped['尺寸系统'])}；`;
                if (grouped['生产系统']) prompt += `【生产】${get(grouped['生产系统'])}；`;
                prompt += `【摄影调性】${get(grouped['高端商业摄影']) || '电影级画面质感'}；`;
                prompt += `【AI要素】${get(grouped['AI提示词要素']) || '多视图陈列+8K超高清+C4D渲染'}——高品质产品摄影布光，柔光箱加侧逆光，空气感微尘，博物馆级展陈质感，极致细节，包装设计获奖作品级画面。`;
                return { conceptName: (currentBrand ? currentBrand + ' · ' : '') + c.name, fullPrompt: prompt, index: i };
            });
            updatePromptsDisplay();
            showToast('✅ 已生成20组不重复提示词！');
            document.getElementById('promptsScrollArea').scrollTop = 0;
        }

        function copySinglePrompt(index, btn) {
            if (index >= 0 && index < generatedPromptsCache.length) {
                const text = generatedPromptsCache[index].fullPrompt;
                navigator.clipboard?.writeText(text).then(() => {
                    btn.classList.add('copied');
                    btn.textContent = '✅ 已复制';
                    setTimeout(() => { btn.classList.remove('copied');
                        btn.textContent = '📋 复制此条'; }, 1800);
                    showToast('📋 已复制');
                }).catch(() => {
                    const ta = document.createElement('textarea');
                    ta.value = text;
                    document.body.appendChild(ta);
                    ta.select();
                    document.execCommand('copy');
                    document.body.removeChild(ta);
                    showToast('📋 已复制');
                });
            }
        }

        function showToast(msg) {
            const toast = document.getElementById('toast');
            toast.textContent = msg;
            toast.classList.add('show');
            clearTimeout(toast._timeout);
            toast._timeout = setTimeout(() => toast.classList.remove('show'), 2000);
        }
        init();
        renderSubcategories('行业包装分类');
    </script>
</body>
</html>
