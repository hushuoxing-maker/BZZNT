<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>包装设计智能体 | 九组同源扩展 · 场景一致 V13</title>
    <style>
        :root {
            --bg: #0d0e11;
            --surface: #14151a;
            --card: #1a1c22;
            --border: #262830;
            --border-light: #2e3039;
            --text: #e2e4e9;
            --text2: #a1a5b0;
            --text3: #6b6f7a;
            --accent: #c9a96e;
            --accent-light: #e0cfa5;
            --accent-dark: #8b6f3f;
            --gold: #c9a96e;
            --radius-sm: 6px;
            --radius: 10px;
            --radius-lg: 14px;
            --shadow-sm: 0 1px 2px rgba(0, 0, 0, 0.5);
            --shadow-md: 0 4px 16px rgba(0, 0, 0, 0.6);
            --font: 'Inter', 'SF Pro Display', 'PingFang SC', 'Microsoft YaHei', sans-serif;
            --font-cn: 'PingFang SC', 'Noto Serif SC', 'STSong', 'Microsoft YaHei', serif;
            --transition: 0.25s cubic-bezier(0.4, 0, 0.2, 1);
        }
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            background: var(--bg);
            color: var(--text);
            font-family: var(--font);
            height: 100vh;
            display: flex;
            flex-direction: column;
            overflow: hidden;
            letter-spacing: 0.01em;
            -webkit-font-smoothing: antialiased;
        }
        ::-webkit-scrollbar {
            width: 4px;
            height: 4px;
        }
        ::-webkit-scrollbar-track {
            background: transparent;
        }
        ::-webkit-scrollbar-thumb {
            background: #3a3d47;
            border-radius: 3px;
        }
        .header {
            background: var(--surface);
            border-bottom: 1px solid var(--border);
            padding: 10px 22px;
            display: flex;
            align-items: center;
            gap: 14px;
            flex-shrink: 0;
            z-index: 10;
            box-shadow: var(--shadow-sm);
        }
        .header .logo-icon {
            width: 36px;
            height: 36px;
            border-radius: 8px;
            background: linear-gradient(135deg, #d4ba8a, #a8853f);
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: 700;
            font-size: 18px;
            color: #1a1c22;
            flex-shrink: 0;
        }
        .header .brand-name {
            font-weight: 600;
            font-size: 14px;
            letter-spacing: 0.04em;
            color: #e2e4e9;
            font-family: var(--font-cn);
        }
        .header .brand-sub {
            font-size: 9px;
            letter-spacing: 0.08em;
            color: var(--text3);
            text-transform: uppercase;
            font-weight: 400;
        }
        .header .spacer {
            flex: 1;
        }
        .header .mode-badge {
            font-size: 9px;
            letter-spacing: 0.06em;
            background: rgba(201, 169, 110, 0.1);
            color: var(--accent);
            padding: 5px 12px;
            border-radius: 16px;
            border: 1px solid rgba(201, 169, 110, 0.25);
            font-family: var(--font-cn);
        }
        .main-layout {
            display: flex;
            flex: 1;
            overflow: hidden;
            gap: 0;
        }
        .panel-left {
            width: 420px;
            flex-shrink: 0;
            display: flex;
            flex-direction: column;
            overflow: hidden;
            background: var(--surface);
            border-right: 1px solid var(--border);
        }
        .panel-right {
            flex: 1;
            display: flex;
            flex-direction: column;
            overflow: hidden;
            background: var(--bg);
        }
        .panel-left-header {
            padding: 12px 16px;
            border-bottom: 1px solid var(--border);
            flex-shrink: 0;
            font-weight: 600;
            font-size: 12px;
            letter-spacing: 0.04em;
            color: var(--text);
            display: flex;
            align-items: center;
            gap: 8px;
            font-family: var(--font-cn);
        }
        .panel-left-body {
            flex: 1;
            overflow-y: auto;
            padding: 8px 10px;
        }
        .panel-right-header {
            padding: 10px 16px;
            border-bottom: 1px solid var(--border);
            flex-shrink: 0;
            display: flex;
            align-items: center;
            gap: 10px;
            font-weight: 600;
            font-size: 12px;
            letter-spacing: 0.04em;
            font-family: var(--font-cn);
        }
        .panel-right-body {
            flex: 1;
            overflow-y: auto;
            padding: 10px 14px;
        }
        .brand-row {
            display: flex;
            align-items: center;
            gap: 8px;
            padding: 8px 10px;
            background: var(--card);
            border: 1px solid var(--border);
            border-radius: var(--radius);
            margin-bottom: 10px;
        }
        .brand-row input {
            flex: 1;
            padding: 7px 10px;
            background: #0d0e11;
            border: 1px solid var(--border-light);
            border-radius: var(--radius-sm);
            color: var(--text);
            font-size: 12px;
            font-family: var(--font);
            letter-spacing: 0.02em;
        }
        .brand-row input:focus {
            outline: none;
            border-color: var(--accent);
            box-shadow: 0 0 0 2px rgba(201, 169, 110, 0.12);
        }
        .brand-row .btn-brand {
            padding: 7px 14px;
            background: var(--accent);
            color: #1a1c22;
            border: none;
            border-radius: 16px;
            cursor: pointer;
            font-weight: 600;
            font-size: 11px;
            font-family: var(--font-cn);
            white-space: nowrap;
            transition: all var(--transition);
        }
        .brand-row .btn-brand:hover {
            background: var(--accent-light);
            box-shadow: 0 4px 14px rgba(201, 169, 110, 0.3);
        }
        .cat-card {
            background: var(--card);
            border: 1px solid var(--border);
            border-radius: var(--radius-lg);
            margin-bottom: 8px;
            overflow: hidden;
            transition: all var(--transition);
        }
        .cat-card:hover {
            border-color: #3a3d47;
        }
        .cat-card summary {
            padding: 10px 14px;
            cursor: pointer;
            list-style: none;
            display: flex;
            align-items: center;
            gap: 8px;
            font-size: 12px;
            font-weight: 600;
            color: var(--text);
            user-select: none;
            font-family: var(--font-cn);
            letter-spacing: 0.03em;
            transition: background var(--transition);
        }
        .cat-card summary::-webkit-details-marker {
            display: none;
        }
        .cat-card summary:hover {
            background: #1e2027;
        }
        .cat-card .cat-icon {
            font-size: 14px;
            flex-shrink: 0;
        }
        .cat-card .cat-arrow {
            margin-left: auto;
            font-size: 10px;
            color: var(--text3);
            transition: transform var(--transition);
        }
        .cat-card[open] .cat-arrow {
            transform: rotate(180deg);
            color: var(--accent);
        }
        .cat-card .cat-content {
            padding: 6px 12px 10px;
            border-top: 1px solid var(--border);
            display: flex;
            flex-wrap: wrap;
            gap: 5px;
        }
        .cat-card .cat-content .group-name {
            width: 100%;
            font-size: 9px;
            color: var(--text3);
            letter-spacing: 0.06em;
            margin: 4px 0 2px;
            text-transform: uppercase;
            font-weight: 500;
            font-family: var(--font-cn);
        }
        .option-chip {
            display: inline-flex;
            align-items: center;
            gap: 4px;
            padding: 5px 11px;
            border: 1px solid var(--border-light);
            background: transparent;
            color: var(--text2);
            border-radius: 16px;
            cursor: pointer;
            font-size: 10.5px;
            font-family: var(--font-cn);
            letter-spacing: 0.03em;
            transition: all var(--transition);
            white-space: nowrap;
            user-select: none;
        }
        .option-chip:hover {
            border-color: #555a66;
            color: #d0d4db;
            background: #1e2027;
        }
        .option-chip.selected {
            background: rgba(201, 169, 110, 0.12);
            border-color: var(--accent);
            color: var(--accent-light);
            font-weight: 500;
            box-shadow: 0 0 0 1px rgba(201, 169, 110, 0.2);
        }
        .color-dot {
            width: 12px;
            height: 12px;
            border-radius: 3px;
            flex-shrink: 0;
            border: 1px solid rgba(255, 255, 255, 0.2);
        }
        .selected-tags-bar {
            padding: 8px 12px;
            border-bottom: 1px solid var(--border);
            background: var(--surface);
            flex-shrink: 0;
            min-height: 40px;
            display: flex;
            flex-wrap: wrap;
            gap: 5px;
            align-items: center;
        }
        .tag-pill {
            display: inline-flex;
            align-items: center;
            gap: 4px;
            padding: 4px 10px;
            background: rgba(201, 169, 110, 0.08);
            border: 1px solid rgba(201, 169, 110, 0.3);
            border-radius: 14px;
            font-size: 10px;
            color: var(--accent-light);
            cursor: pointer;
            font-family: var(--font-cn);
            letter-spacing: 0.03em;
            transition: all var(--transition);
            white-space: nowrap;
        }
        .tag-pill:hover {
            background: rgba(201, 169, 110, 0.18);
            border-color: var(--accent);
        }
        .tag-pill.brand-tag {
            border-color: var(--accent);
            background: rgba(201, 169, 110, 0.15);
            font-weight: 600;
        }
        .action-bar {
            padding: 8px 12px;
            border-bottom: 1px solid var(--border);
            background: var(--surface);
            flex-shrink: 0;
            display: flex;
            gap: 8px;
            align-items: center;
        }
        .btn-generate {
            padding: 9px 20px;
            background: linear-gradient(135deg, #c9a96e, #a8853f);
            color: #1a1c22;
            border: none;
            border-radius: 20px;
            cursor: pointer;
            font-weight: 700;
            font-size: 12px;
            letter-spacing: 0.05em;
            font-family: var(--font-cn);
            box-shadow: 0 4px 16px rgba(201, 169, 110, 0.25);
            transition: all var(--transition);
            white-space: nowrap;
        }
        .btn-generate:hover {
            transform: translateY(-1px);
            box-shadow: 0 8px 24px rgba(201, 169, 110, 0.45);
        }
        .btn-clear {
            padding: 7px 14px;
            background: transparent;
            border: 1px solid var(--border-light);
            color: var(--text2);
            border-radius: 18px;
            cursor: pointer;
            font-size: 10.5px;
            font-family: var(--font-cn);
            transition: all var(--transition);
            white-space: nowrap;
        }
        .btn-clear:hover {
            border-color: #6b6f7a;
            color: #d0d4db;
        }
        .empty-output {
            text-align: center;
            padding: 60px 20px;
            color: var(--text3);
            font-family: var(--font-cn);
            font-size: 12px;
            letter-spacing: 0.04em;
        }
        .proposal-card {
            background: var(--card);
            border: 1px solid var(--border);
            border-radius: var(--radius-lg);
            margin-bottom: 8px;
            overflow: hidden;
            transition: all var(--transition);
        }
        .proposal-card:hover {
            border-color: #3a3d47;
            box-shadow: var(--shadow-md);
        }
        .proposal-card summary {
            padding: 10px 14px;
            cursor: pointer;
            list-style: none;
            display: flex;
            align-items: center;
            gap: 10px;
            font-size: 12px;
            font-weight: 600;
            color: var(--text);
            user-select: none;
            font-family: var(--font-cn);
            letter-spacing: 0.03em;
            transition: background var(--transition);
        }
        .proposal-card summary::-webkit-details-marker {
            display: none;
        }
        .proposal-card summary:hover {
            background: #1e2027;
        }
        .proposal-card .prop-num {
            font-weight: 700;
            font-size: 16px;
            color: var(--accent);
            min-width: 28px;
            text-align: center;
            font-family: var(--font);
        }
        .proposal-card .prop-arrow {
            margin-left: auto;
            font-size: 9px;
            color: var(--text3);
            transition: transform var(--transition);
        }
        .proposal-card[open] .prop-arrow {
            transform: rotate(180deg);
            color: var(--accent);
        }
        .proposal-card .prop-content {
            padding: 8px 14px 12px 52px;
            font-size: 10.5px;
            line-height: 1.7;
            color: var(--text2);
            border-top: 1px solid var(--border);
            font-family: var(--font-cn);
            letter-spacing: 0.02em;
            display: flex;
            flex-direction: column;
            gap: 6px;
        }
        .prop-section {
            background: #0d0e11;
            border-radius: var(--radius-sm);
            padding: 8px 10px;
            border: 1px solid var(--border);
        }
        .prop-section .sec-label {
            font-size: 9px;
            font-weight: 700;
            color: var(--accent);
            letter-spacing: 0.06em;
            margin-bottom: 3px;
            text-transform: uppercase;
            font-family: var(--font-cn);
        }
        .btn-copy-prop {
            display: inline-block;
            margin-top: 4px;
            padding: 4px 10px;
            background: transparent;
            border: 1px solid var(--border-light);
            border-radius: 10px;
            cursor: pointer;
            font-size: 9px;
            color: var(--text2);
            font-family: var(--font-cn);
            letter-spacing: 0.04em;
            transition: all var(--transition);
        }
        .btn-copy-prop:hover {
            background: #1e2027;
            border-color: #5a5e69;
            color: #d0d4db;
        }
        .btn-copy-prop.copied {
            background: rgba(46, 204, 113, 0.1);
            border-color: rgba(46, 204, 113, 0.4);
            color: #2ecc71;
        }
        .toast {
            position: fixed;
            top: 20px;
            left: 50%;
            transform: translateX(-50%);
            background: #2a2d35;
            color: #e2e4e9;
            padding: 10px 22px;
            border-radius: 22px;
            font-size: 11px;
            z-index: 999;
            opacity: 0;
            transition: opacity 0.35s;
            pointer-events: none;
            font-family: var(--font-cn);
            letter-spacing: 0.04em;
            box-shadow: 0 6px 20px rgba(0, 0, 0, 0.5);
            border: 1px solid var(--border-light);
        }
        .toast.show {
            opacity: 1;
        }
        @media (max-width: 1000px) {
            .main-layout {
                flex-direction: column;
            }
            .panel-left {
                width: 100%;
                max-height: 42%;
            }
            .panel-right {
                flex: 1;
            }
        }
    </style>
</head>
<body>
    <div class="header">
        <div class="logo-icon">包</div>
        <span class="brand-name">包装设计智能体</span>
        <span class="brand-sub">Packaging AI Agent</span>
        <span class="spacer"></span>
        <span class="mode-badge">九组同源扩展 · 场景一致 · V13</span>
    </div>
    <div class="main-layout">
        <div class="panel-left">
            <div class="panel-left-header">📂 分类选择 <span style="color:var(--text3);font-weight:400;font-size:10px;margin-left:auto;">单选 · 输入品牌自动推荐</span></div>
            <div class="panel-left-body">
                <div class="brand-row">
                    <span style="font-size:13px;">🏷️</span>
                    <span style="font-size:10px;color:var(--text3);white-space:nowrap;">品牌/产品</span>
                    <input type="text" id="brandInput" placeholder="输入品牌或产品名称，自动识别行业…" maxlength="40" onkeydown="if(event.key==='Enter')addBrand()">
                    <button class="btn-brand" onclick="addBrand()">+ 添加</button>
                </div>
                <div id="categoriesContainer"></div>
            </div>
        </div>
        <div class="panel-right">
            <div class="panel-right-header">📋 九组同源扩展方案<span id="tagCountLabel" style="margin-left:auto;font-size:10px;color:var(--text3);">已选 0 项</span></div>
            <div class="selected-tags-bar" id="selectedTagsBar"><span style="color:var(--text3);font-size:10px;">等待选择标签…</span></div>
            <div class="action-bar">
                <button class="btn-generate" onclick="generateProposal()">✦ 生成九组同源扩展方案</button>
                <button class="btn-clear" onclick="clearAll()">清空全部</button>
                <span class="tag-count" id="tagCountText">已选 0 项</span>
            </div>
            <div class="panel-right-body" id="outputArea">
                <div class="empty-output"><span class="empty-icon">📝</span>请在左侧选择标签<br>每组仅可选一项，选择后点击生成</div>
            </div>
        </div>
    </div>
    <div class="toast" id="toast"></div>
