<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>包装设计智能体 | 20组提案生成 V3.0</title>
    <style>
        :root {
            --bg: #f6f4f0;
            --panel: #ffffff;
            --card: #fdfcf9;
            --border: #e5e0d9;
            --border2: #d9d2c7;
            --text: #2b2a27;
            --text2: #6b6358;
            --text3: #9b9285;
            --accent: #b8945a;
            --accent2: #8b6f3f;
            --gold: #c9a96e;
            --gold-light: #f5efe5;
            --tag-bg: #f8f4ed;
            --tag-text: #6b5e48;
            --btn-bg: #faf7f2;
            --btn-hover: #f0ebe0;
            --btn-active: #fdf7ed;
            --btn-active-border: #c9a96e;
            --input-bg: #fdfcf9;
            --shadow-sm: 0 1px 2px rgba(0, 0, 0, 0.04);
            --shadow-md: 0 3px 16px rgba(0, 0, 0, 0.06);
            --shadow-lg: 0 8px 32px rgba(0, 0, 0, 0.10);
            --radius-sm: 5px;
            --radius: 8px;
            --radius-lg: 14px;
            --transition: 0.22s cubic-bezier(0.4, 0, 0.2, 1);
            --font: 'Inter', 'PingFang SC', 'Microsoft YaHei', 'Helvetica Neue', sans-serif;
            --font-cn: 'PingFang SC', 'Noto Serif SC', 'Microsoft YaHei', 'STSong', sans-serif;
            --font-serif: 'Noto Serif SC', 'STSong', 'Songti SC', 'SimSun', serif;
        }
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            background: #f0ede8;
            color: var(--text);
            font-family: var(--font);
            height: 100vh;
            display: flex;
            flex-direction: column;
            overflow: hidden;
            letter-spacing: 0.01em;
            -webkit-font-smoothing: antialiased;
            background-image:
                radial-gradient(ellipse at 50% 0%, rgba(201, 169, 110, 0.04) 0%, transparent 70%),
                radial-gradient(ellipse at 50% 100%, rgba(180, 150, 100, 0.03) 0%, transparent 70%);
        }
        ::-webkit-scrollbar {
            width: 5px;
            height: 5px;
        }
        ::-webkit-scrollbar-track {
            background: transparent;
        }
        ::-webkit-scrollbar-thumb {
            background: #d5cfc5;
            border-radius: 4px;
        }
        ::-webkit-scrollbar-thumb:hover {
            background: #b8b0a4;
        }

        /* ========== HEADER ========== */
        .header {
            background: var(--panel);
            border-bottom: 1px solid var(--border);
            padding: 12px 28px;
            display: flex;
            align-items: center;
            gap: 14px;
            flex-shrink: 0;
            z-index: 20;
            box-shadow: var(--shadow-sm);
            justify-content: center;
            letter-spacing: 0.03em;
        }
        .header .logo-mark {
            width: 34px;
            height: 34px;
            border-radius: 7px;
            background: linear-gradient(145deg, #d4ba8a, #a8853f);
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: 700;
            font-size: 17px;
            color: #fff;
            flex-shrink: 0;
            box-shadow: 0 2px 8px rgba(168, 133, 63, 0.3);
            font-family: var(--font-serif);
        }
        .header .brand-text {
            font-family: var(--font-serif);
            font-weight: 600;
            font-size: 15px;
            letter-spacing: 0.06em;
            color: #2b2a27;
        }
        .header .brand-sub {
            font-weight: 300;
            font-size: 10px;
            letter-spacing: 0.10em;
            color: var(--accent2);
            text-transform: uppercase;
            font-family: var(--font);
        }
        .header .divider-dot {
            width: 5px;
            height: 5px;
            border-radius: 50%;
            background: var(--gold);
            opacity: 0.5;
            margin: 0 2px;
        }
        .header .badge {
            font-size: 9px;
            letter-spacing: 0.06em;
            background: var(--gold-light);
            color: var(--accent2);
            padding: 5px 12px;
            border-radius: 20px;
            border: 1px solid #e5d5b8;
            font-family: var(--font-cn);
            white-space: nowrap;
        }

        /* ========== MAIN SYMMETRIC LAYOUT ========== */
        .main-symmetric {
            display: flex;
            flex: 1;
            overflow: hidden;
            gap: 0;
            position: relative;
        }
        /* 中轴线 */
        .main-symmetric::before {
            content: '';
            position: absolute;
            left: 50%;
            top: 0;
            bottom: 0;
            width: 1px;
            background: linear-gradient(to bottom, transparent, var(--border2), var(--border2), transparent);
            z-index: 1;
            pointer-events: none;
        }
        /* 左面板 */
        .panel-left {
            width: 50%;
            display: flex;
            flex-direction: column;
            overflow: hidden;
            background: #faf9f7;
            border-right: none;
            position: relative;
        }
        /* 右面板 */
        .panel-right {
            width: 50%;
            display: flex;
            flex-direction: column;
            overflow: hidden;
            background: #fdfcf9;
            border-left: none;
            position: relative;
        }
        .panel-header {
            padding: 10px 18px;
            border-bottom: 1px solid var(--border);
            background: #fdfcf9;
            flex-shrink: 0;
            display: flex;
            align-items: center;
            gap: 8px;
        }
        .panel-header .panel-icon {
            font-size: 14px;
            opacity: 0.7;
        }
        .panel-header .panel-title {
            font-family: var(--font-serif);
            font-weight: 600;
            font-size: 12.5px;
            letter-spacing: 0.05em;
            color: #3a3732;
        }
        .panel-header .panel-hint {
            font-size: 10px;
            color: #b0a99e;
            letter-spacing: 0.03em;
            margin-left: auto;
        }
        .panel-body {
            flex: 1;
            overflow-y: auto;
            padding: 10px 14px;
        }

        /* ========== LEFT PANEL: 分类 + 子类 ========== */
        .left-inner {
            display: flex;
            height: 100%;
            gap: 0;
        }
        .left-sidebar-cats {
            width: 135px;
            flex-shrink: 0;
            overflow-y: auto;
            border-right: 1px solid #f0ece5;
            padding: 4px 0;
            background: #fdfcf9;
            border-radius: 0;
        }
        .left-sidebar-cats .cat-btn {
            display: flex;
            align-items: center;
            gap: 7px;
            width: 100%;
            padding: 8px 11px;
            border: none;
            background: transparent;
            color: var(--text2);
            font-size: 11px;
            cursor: pointer;
            text-align: left;
            transition: all var(--transition);
            letter-spacing: 0.03em;
            font-family: var(--font-cn);
            border-left: 2px solid transparent;
            white-space: nowrap;
            border-radius: 0;
        }
        .left-sidebar-cats .cat-btn:hover {
            background: #f8f5ef;
            color: #4a4540;
        }
        .left-sidebar-cats .cat-btn.active {
            background: #fdf8f0;
            color: var(--accent2);
            border-left-color: var(--accent);
            font-weight: 600;
        }
        .left-sidebar-cats .cat-icon {
            width: 16px;
            text-align: center;
            font-size: 12px;
            flex-shrink: 0;
            opacity: 0.7;
        }
        .left-subcat-area {
            flex: 1;
            overflow-y: auto;
            padding: 10px 12px;
        }
        .left-subcat-area .group-label {
            font-size: 10px;
            color: #b5ada0;
            letter-spacing: 0.06em;
            margin: 6px 0 3px;
            font-family: var(--font-cn);
            text-transform: uppercase;
        }
        .subcat-btn {
            display: inline-block;
            padding: 6px 13px;
            border: 1px solid var(--border);
            background: var(--btn-bg);
            color: #5c554a;
            border-radius: 18px;
            cursor: pointer;
            font-size: 11px;
            font-family: var(--font-cn);
            letter-spacing: 0.03em;
            transition: all var(--transition);
            white-space: nowrap;
            user-select: none;
            margin: 2px 3px;
        }
        .subcat-btn:hover {
            background: var(--btn-hover);
            border-color: #c5bca8;
            color: #3a3530;
        }
        .subcat-btn.selected {
            background: #fef9f0;
            border-color: var(--accent);
            color: var(--accent2);
            font-weight: 500;
            box-shadow: 0 0 0 2px rgba(201, 169, 110, 0.12);
        }
        .color-swatch {
            display: inline-block;
            width: 15px;
            height: 15px;
            border-radius: 3px;
            margin-right: 5px;
            vertical-align: middle;
            border: 1px solid #ddd;
            flex-shrink: 0;
            box-shadow: inset 0 1px 2px rgba(0, 0, 0, 0.08);
        }
        .size-input-row {
            display: flex;
            gap: 4px;
            align-items: center;
            flex-wrap: wrap;
            margin: 4px 0;
        }
        .size-input-row input {
            width: 52px;
            padding: 5px 6px;
            border: 1px solid var(--border);
            background: #fffefb;
            color: #3a3530;
            border-radius: 4px;
            font-size: 10.5px;
            font-family: var(--font);
            text-align: center;
            letter-spacing: 0.02em;
        }
        .size-input-row input:focus {
            outline: none;
            border-color: var(--accent);
            box-shadow: 0 0 0 2px rgba(201, 169, 110, 0.10);
        }
        .size-input-row .unit-label {
            font-size: 9px;
            color: #a0988c;
            letter-spacing: 0.03em;
        }
        .preset-size-btn {
            display: inline-block;
            padding: 4px 9px;
            border: 1px solid #e5e0d5;
            background: #fdfcf8;
            color: #7a7065;
            border-radius: 12px;
            cursor: pointer;
            font-size: 10px;
            font-family: var(--font-cn);
            letter-spacing: 0.02em;
            transition: all var(--transition);
            white-space: nowrap;
            margin: 2px;
        }
        .preset-size-btn:hover {
            border-color: #c5bca8;
            color: #4a4540;
        }
        .preset-size-btn.selected {
            border-color: var(--accent);
            color: var(--accent2);
            background: #fef9f0;
        }

        /* ========== RIGHT PANEL: 已选标签 + 20组提示词 ========== */
        .right-top-tags {
            padding: 10px 14px;
            border-bottom: 1px solid var(--border);
            background: #fefdfa;
            flex-shrink: 0;
            min-height: 44px;
            display: flex;
            flex-wrap: wrap;
            gap: 5px;
            align-items: center;
        }
        .right-top-tags .no-tags {
            font-size: 10px;
            color: #c5bdb0;
            letter-spacing: 0.04em;
        }
        .selected-tag-pill {
            display: inline-flex;
            align-items: center;
            gap: 4px;
            padding: 4px 10px;
            background: #fdf8f0;
            border: 1px solid #e5d5b8;
            border-radius: 14px;
            font-size: 10px;
            color: var(--accent2);
            letter-spacing: 0.03em;
            font-family: var(--font-cn);
            cursor: pointer;
            transition: all var(--transition);
            white-space: nowrap;
        }
        .selected-tag-pill:hover {
            background: #fef3e2;
            border-color: #c9a96e;
        }
        .selected-tag-pill .remove-x {
            font-size: 9px;
            opacity: 0.5;
            cursor: pointer;
            margin-left: 1px;
        }
        .right-action-row {
            padding: 8px 14px;
            border-bottom: 1px solid var(--border);
            background: #fefdfa;
            flex-shrink: 0;
            display: flex;
            gap: 8px;
            align-items: center;
            flex-wrap: wrap;
        }
        .btn-generate {
            padding: 9px 20px;
            background: linear-gradient(135deg, #c9a96e, #a8853f);
            color: #fff;
            border: none;
            border-radius: 20px;
            cursor: pointer;
            font-weight: 600;
            font-size: 12px;
            letter-spacing: 0.05em;
            font-family: var(--font-cn);
            transition: all var(--transition);
            white-space: nowrap;
            box-shadow: 0 3px 12px rgba(168, 133, 63, 0.25);
        }
        .btn-generate:hover {
            box-shadow: 0 6px 22px rgba(168, 133, 63, 0.40);
            transform: translateY(-1px);
        }
        .btn-generate:active {
            transform: scale(0.96);
        }
        .btn-clear-all {
            padding: 7px 14px;
            background: transparent;
            border: 1px solid #d5cfc2;
            color: #8b8275;
            border-radius: 18px;
            cursor: pointer;
            font-size: 10.5px;
            letter-spacing: 0.04em;
            font-family: var(--font-cn);
            transition: all var(--transition);
            white-space: nowrap;
        }
        .btn-clear-all:hover {
            border-color: #b5a898;
            color: #4a4540;
        }
        .tag-count-badge {
            font-size: 10px;
            color: #b0a99e;
            letter-spacing: 0.04em;
            font-family: var(--font-cn);
        }
        /* 20组提示词展示区 */
        .prompts-scroll-area {
            flex: 1;
            overflow-y: auto;
            padding: 8px 10px;
        }
        .prompt-card {
            background: #fefdfa;
            border: 1px solid #ece7dd;
            border-radius: var(--radius-sm);
            margin-bottom: 7px;
            overflow: hidden;
            transition: all var(--transition);
            box-shadow: var(--shadow-sm);
        }
        .prompt-card:hover {
            border-color: #d5ccbb;
            box-shadow: var(--shadow-md);
        }
        .prompt-card summary {
            display: flex;
            align-items: center;
            gap: 10px;
            padding: 9px 12px;
            cursor: pointer;
            list-style: none;
            user-select: none;
            font-size: 11px;
            letter-spacing: 0.03em;
            font-family: var(--font-cn);
            transition: background var(--transition);
        }
        .prompt-card summary::-webkit-details-marker {
            display: none;
        }
        .prompt-card summary:hover {
            background: #fdf9f3;
        }
        .prompt-card .p-num {
            font-family: var(--font-serif);
            font-weight: 600;
            font-size: 20px;
            color: #d5ccbb;
            min-width: 28px;
            text-align: center;
            transition: color var(--transition);
        }
        .prompt-card[open] .p-num {
            color: var(--accent);
        }
        .prompt-card .p-title {
            flex: 1;
            font-weight: 500;
            color: #3a3530;
            font-size: 11.5px;
            letter-spacing: 0.04em;
            font-family: var(--font-serif);
        }
        .prompt-card .p-arrow {
            font-size: 9px;
            color: #c5bdb0;
            transition: transform var(--transition);
        }
        .prompt-card[open] .p-arrow {
            transform: rotate(180deg);
            color: var(--accent);
        }
        .prompt-card .p-content {
            padding: 8px 12px 12px 48px;
            font-size: 10.5px;
            line-height: 1.8;
            color: #5c554a;
            letter-spacing: 0.02em;
            font-family: var(--font-cn);
            border-top: 1px solid #f5f1ea;
            position: relative;
        }
        .prompt-card .btn-copy-small {
            display: inline-block;
            margin-top: 6px;
            padding: 4px 10px;
            background: #faf7f2;
            border: 1px solid #e5dfd5;
            border-radius: 10px;
            cursor: pointer;
            font-size: 9.5px;
            letter-spacing: 0.04em;
            color: #8b8275;
            font-family: var(--font-cn);
            transition: all var(--transition);
        }
        .prompt-card .btn-copy-small:hover {
            background: #f0ebe0;
            border-color: #c5bca8;
            color: #4a4540;
        }
        .prompt-card .btn-copy-small.copied {
            background: #e8f5e9;
            border-color: #a5d6a7;
            color: #2e7d32;
        }
        .empty-state {
            text-align: center;
            padding: 30px 20px;
            color: #c5bdb0;
            font-family: var(--font-cn);
            font-size: 11px;
            letter-spacing: 0.04em;
        }
        .empty-state .icon-big {
            font-size: 40px;
            display: block;
            margin-bottom: 10px;
            opacity: 0.5;
        }

        /* ========== TOAST ========== */
        .toast {
            position: fixed;
            top: 20px;
            left: 50%;
            transform: translateX(-50%);
            background: #3a3530;
            color: #f5efe5;
            padding: 9px 22px;
            border-radius: 20px;
            font-size: 11px;
            letter-spacing: 0.04em;
            z-index: 999;
            pointer-events: none;
            opacity: 0;
            transition: opacity 0.35s;
            font-family: var(--font-cn);
            box-shadow: 0 6px 20px rgba(0, 0, 0, 0.20);
        }
        .toast.show {
            opacity: 1;
        }

        /* ========== RESPONSIVE ========== */
        @media (max-width: 900px) {
            .main-symmetric {
                flex-direction: column;
            }
            .main-symmetric::before {
                display: none;
            }
            .panel-left,
            .panel-right {
                width: 100%;
                flex: none;
                max-height: 48%;
                min-height: 300px;
            }
            .left-sidebar-cats {
                width: 100px;
            }
            .left-sidebar-cats .cat-btn {
                font-size: 10px;
                padding: 6px 8px;
            }
            .subcat-btn {
                font-size: 10px;
                padding: 4px 10px;
            }
            .header {
                padding: 8px 14px;
                gap: 8px;
            }
            .header .brand-text {
                font-size: 13px;
            }
        }
        @media (max-width: 500px) {
            .left-inner {
                flex-direction: column;
            }
            .left-sidebar-cats {
                width: 100%;
                flex-direction: row;
                display: flex;
                overflow-x: auto;
                border-right: none;
                border-bottom: 1px solid #f0ece5;
                padding: 2px 4px;
            }
            .left-sidebar-cats .cat-btn {
                flex-shrink: 0;
                border-left: none;
                border-bottom: 2px solid transparent;
                padding: 5px 9px;
                font-size: 10px;
                white-space: nowrap;
            }
            .left-sidebar-cats .cat-btn.active {
                border-left-color: transparent;
                border-bottom-color: var(--accent);
            }
            .prompt-card .p-num {
                font-size: 16px;
                min-width: 22px;
            }
            .prompt-card .p-title {
                font-size: 10px;
            }
            .prompt-card .p-content {
                font-size: 9.5px;
                padding-left: 30px;
            }
        }
    </style>
</head>
<body>

    <!-- HEADER -->
    <div class="header">
        <div class="logo-mark">包</div>
        <span class="brand-text">包装设计智能体</span>
        <span class="divider-dot"></span>
        <span class="brand-sub">PACKAGING AI AGENT</span>
        <span class="divider-dot"></span>
        <span class="badge">2026新规合规 · 20组提案</span>
    </div>

    <!-- 左右对称主体 -->
    <div class="main-symmetric">

        <!-- ========== 左面板：分类选择 ========== -->
        <div class="panel-left">
            <div class="panel-header">
                <span class="panel-icon">📂</span>
                <span class="panel-title">分类选择</span>
                <span class="panel-hint">点击左侧分类 → 选择子类</span>
            </div>
            <div class="left-inner">
                <!-- 一级母类侧边栏 -->
                <div class="left-sidebar-cats" id="leftSidebarCats"></div>
                <!-- 子类选择区 -->
                <div class="left-subcat-area" id="leftSubcatArea"></div>
            </div>
        </div>

        <!-- ========== 右面板：已选标签 + 20组提示词 ========== -->
        <div class="panel-right">
            <div class="panel-header">
                <span class="panel-icon">📋</span>
                <span class="panel-title">生成结果 · 20组提案提示词</span>
                <span class="panel-hint" id="tagCountLabel">已选 0 项</span>
            </div>
            <!-- 已选标签 -->
            <div class="right-top-tags" id="rightTopTags">
                <span class="no-tags">等待选择标签…</span>
            </div>
            <!-- 操作按钮 -->
            <div class="right-action-row">
                <button class="btn-generate" onclick="generate20Prompts()">✦ 生成20组提示词</button>
                <button class="btn-clear-all" onclick="clearAllSelections()">清空全部</button>
            </div>
            <!-- 20组提示词展示 -->
            <div class="prompts-scroll-area" id="promptsScrollArea">
                <div class="empty-state">
                    <span class="icon-big">📝</span>
                    请先在左侧选择标签<br>然后点击「生成20组提示词」
                </div>
            </div>
        </div>
    </div>

    <!-- TOAST -->
    <div class="toast" id="toast"></div>

    <script>
        // ==================== 数据定义 ====================
        const categoryData = {
            '行业包装分类': {
                icon: '📦',
                sub: {
                    '食品包装': ['零食包装', '茶叶包装', '咖啡包装', '烘焙包装', '月饼礼盒', '水果包装', '冷冻食品', '调味品包装', '饮料包装', '酒类包装',
                        '保健品包装', '农产品包装', '生鲜包装', '速食包装', '外卖包装'
                    ],
                    '美妆包装': ['护肤品', '香水', '面膜', '精华液', '彩妆', '口红', '粉底液', '男士护理', '医美包装'],
                    '电子产品包装': ['手机包装', '耳机包装', '数码产品', 'AI设备', '智能硬件', '电器包装'],
                    '礼盒包装': ['节日礼盒', '企业礼盒', '高端礼盒', '茶礼盒', '月饼礼盒', '年货礼盒', '商务礼盒'],

        // ==================== 状态管理 ====================

        function init() {

        function renderLeftSidebar() {
            const sidebar = document.getElementById('leftSidebarCats');
            sidebar.innerHTML = '';
            Object.keys(categoryData).forEach(catName => {
                const btn = document.createElement('button');
                btn.className = 'cat-btn' + (catName === activeCategory ? ' active' : '');
                btn.innerHTML =
                    `<span class="cat-icon">${categoryData[catName].icon}</span><span>${catName.replace('包装','').replace('分类','').replace('系统','')}</span>`;
                btn.onclick = () => {
                    activeCategory = catName;
                    renderLeftSidebar();
                    renderSubcategories(catName);
                };
                sidebar.appendChild(btn);
            });
        }

        function renderSubcategories(catName) {
            const data = categoryData[catName];
            const area = document.getElementById('leftSubcatArea');
            area.innerHTML = '';

            if (!data.sub) return;

            // 颜色系统特殊处理
            if (data.isColor) {
                const colorMap = {
                    '黑金': 'linear-gradient(135deg,#1a1a1a,#c9a96e)',
                    '红金': 'linear-gradient(135deg,#8b0000,#d4a84b)',
                    '白金': 'linear-gradient(135deg,#e8e4df,#c9a96e)',
                    '莫兰迪': '#b5a99d',
                    '奶油色': '#f5ecd7',
                    '中国红': '#c41e3a',
                    '科技蓝': '#1e5fbb',
                    '爱马仕橙': '#f47321',
                    '蒂芙尼蓝': '#81d8d0',
                    '抹茶绿': '#b7c9a8',
                    '高级灰': '#8c8c8c',
                    '荧光色': '#d4ff00',
                    '糖果色': '#ffb3c6'
                };
                Object.entries(data.sub).forEach(([groupName, items]) => {
                    const gl = document.createElement('div');
                    gl.className = 'group-label';
                    gl.textContent = groupName;
                    area.appendChild(gl);
                    items.forEach(item => {
                        const btn = document.createElement('button');
                        btn.className = 'subcat-btn';
                        const cv = colorMap[item] || '#888';
                        btn.innerHTML =
                            `<span class="color-swatch" style="background:${cv};"></span>${item}`;
                        btn.dataset.group = groupName;
                        btn.dataset.value = item;
                        btn.dataset.category = catName;
                        updateSubcatBtnState(btn, catName, groupName, item);
                        btn.onclick = () => toggleTag(catName, groupName, item, btn);
                        area.appendChild(btn);
                    });
                });
                return;
            }

            // 尺寸系统
            if (data.hasInput) {
                const inputRow = document.createElement('div');
                inputRow.className = 'size-input-row';
                const fields = ['长(cm)', '宽(cm)', '高(cm)', '容量(ml)', '克重(g)'];
                fields.forEach(f => {
                    const sp = document.createElement('span');
                    sp.className = 'unit-label';
                    sp.textContent = f;
                    inputRow.appendChild(sp);
                    const inp = document.createElement('input');
                    inp.type = 'text';
                    inp.placeholder = '--';
                    inp.dataset.field = f;
                    inp.onchange = function() {
                        if (this.value.trim()) {
                            addCustomTag(catName, '尺寸参数', f + ':' + this.value.trim());
                        }
                    };
                    inputRow.appendChild(inp);
                });
                area.appendChild(inputRow);

                Object.entries(data.sub).forEach(([groupName, items]) => {
                    const gl = document.createElement('div');
                    gl.className = 'group-label';
                    gl.textContent = groupName;
                    area.appendChild(gl);
                    items.forEach(item => {
                        const btn = document.createElement('button');
                        btn.className = 'preset-size-btn';
                        btn.textContent = item;
                        btn.dataset.group = groupName;
                        btn.dataset.value = item;
                        btn.dataset.category = catName;
                        updateSubcatBtnState(btn, catName, groupName, item);
                        btn.onclick = () => toggleTag(catName, groupName, item, btn);
                        area.appendChild(btn);
                    });
                });
                return;
            }

            // 普通子类
            Object.entries(data.sub).forEach(([groupName, items]) => {
                const gl = document.createElement('div');
                gl.className = 'group-label';
                gl.textContent = groupName;
                area.appendChild(gl);
                items.forEach(item => {
                    const btn = document.createElement('button');
                    btn.className = 'subcat-btn';
                    btn.textContent = item;
                    btn.dataset.group = groupName;
                    btn.dataset.value = item;
                    btn.dataset.category = catName;
                    updateSubcatBtnState(btn, catName, groupName, item);
                    btn.onclick = () => toggleTag(catName, groupName, item, btn);
                    area.appendChild(btn);
                });
            });
        }

        function updateSubcatBtnState(btn, catName, groupName, item) {
            const key = `${catName}|||${groupName}|||${item}`;
            if (selectedTags[key]) {
                btn.classList.add('selected');
            } else {
                btn.classList.remove('selected');
            }
        }

        function toggleTag(catName, groupName, item, btn) {
            const key = `${catName}|||${groupName}|||${item}`;
            if (selectedTags[key]) {
                delete selectedTags[key];
            } else {
                Object.keys(selectedTags).forEach(k => {
                    if (k.startsWith(`${catName}|||${groupName}|||`)) {
                        delete selectedTags[k];
                    }
                });
                selectedTags[key] = { catName, groupName, item };
            }
            renderSubcategories(activeCategory);
            updateRightTags();
            // 清除已生成的提示词（因为选择变化了）
            generatedPromptsCache = [];
            updatePromptsDisplay();
        }

        function addCustomTag(catName, groupName, value) {
            const key = `${catName}|||${groupName}|||${value}`;
            selectedTags[key] = { catName, groupName, item: value };
            updateRightTags();
            generatedPromptsCache = [];
            updatePromptsDisplay();
        }

        function updateRightTags() {
            const container = document.getElementById('rightTopTags');
            const keys = Object.keys(selectedTags);
            document.getElementById('tagCountLabel').textContent = `已选 ${keys.length} 项`;
            if (keys.length === 0) {
                container.innerHTML = '<span class="no-tags">等待选择标签…</span>';
            } else {
                container.innerHTML = keys.map(key => {
                    const v = selectedTags[key];
                    const short = `${v.catName.replace('包装','').replace('分类','').replace('系统','').slice(0,4)}:${v.item}`;
                    return `<span class="selected-tag-pill" title="${v.catName} > ${v.groupName} > ${v.item}" onclick="removeTag('${key.replace(/'/g,"\\'")}')">${short}<span class="remove-x">×</span></span>`;
                }).join('');
            }
        }

        function removeTag(key) {
            delete selectedTags[key];
            renderSubcategories(activeCategory);
            updateRightTags();
            generatedPromptsCache = [];
            updatePromptsDisplay();
        }

        function clearAllSelections() {
            selectedTags = {};
            generatedPromptsCache = [];
            renderSubcategories(activeCategory);
            updateRightTags();
            updatePromptsDisplay();
            showToast('已清空全部选择');
        }

        function updatePromptsDisplay() {
            const area = document.getElementById('promptsScrollArea');
            if (generatedPromptsCache.length === 0) {
                area.innerHTML = `
                <div class="empty-state">
                  <span class="icon-big">📝</span>
                  请先在左侧选择标签<br>然后点击「生成20组提示词」
                </div>`;
            } else {
                area.innerHTML = generatedPromptsCache.map((p, i) => `
                <details class="prompt-card" id="promptCard${i}">
                  <summary>
                    <span class="p-num">${String(i+1).padStart(2,'0')}</span>
                    <span class="p-title">${p.conceptName}</span>
                    <span class="p-arrow">▼</span>
                  </summary>
                  <div class="p-content">
                    ${p.fullPrompt}
                    <br>
                    <button class="btn-copy-small" onclick="copySinglePrompt(${i}, this)" data-index="${i}">📋 复制此条</button>
                  </div>
                </details>`).join('');
            }
        }

        // ==================== 生成20组提示词 ====================
        function generate20Prompts() {
            const keys = Object.keys(selectedTags);
            if (keys.length === 0) {
                showToast('请先在左侧选择至少一个标签');
                return;
            }

            // 收集用户选择的标签信息
            const grouped = {};
            keys.forEach(k => {
                const v = selectedTags[k];
                if (!grouped[v.catName]) grouped[v.catName] = [];
                grouped[v.catName].push(v.item);
            });

            const userIndustry = grouped['行业包装分类'] ? grouped['行业包装分类'].join('、') : '高端消费品';
            const userStructure = grouped['包装结构分类'] ? grouped['包装结构分类'].join('、') : '天地盖盒';
            const userMaterial = grouped['包装材质分类'] ? grouped['包装材质分类'].join('、') : 'FSC认证纸';
            const userCraft = grouped['包装工艺分类'] ? grouped['包装工艺分类'].join('、') : '烫金+压纹';
            const userStyle = grouped['包装风格分类'] ? grouped['包装风格分类'].join('、') : '极简轻奢';
            const userColor = grouped['包装颜色系统'] ? grouped['包装颜色系统'].join('、') : '黑金';
            const userVisual = grouped['包装视觉系统'] ? grouped['包装视觉系统'].join('、') : 'LOGO+品牌名';
            const userEco = grouped['包装环保系统'] ? grouped['包装环保系统'].join('、') : '碳足迹标签';
            const userExp = grouped['包装用户体验'] ? grouped['包装用户体验'].join('、') : '开箱仪式感';
            const userDisplay = grouped['包装展示系统'] ? grouped['包装展示系统'].join('、') : '电商+货架';
            const userSize = grouped['包装尺寸系统'] ? grouped['包装尺寸系统'].join('、') : '';
            const userAI = grouped['AI提示词系统'] ? grouped['AI提示词系统'].join('、') : '多视图陈列+8K超高清+C4D渲染';

            generatedPromptsCache = [];

            // 为20个设计概念分别生成独特提示词
            designConcepts.forEach((concept, index) => {
                // 每个概念使用不同的环保要素组合
                const ecoOptions = [
                    '碳足迹标签+盲文压印',
                    '全成分透明窗+数字水印',
                    'NFC触碰区+产品溯源二维码',
                    '大豆油墨+水性涂层+无塑封膜',
                    '零废弃展开式+碳足迹标签',
                    '替换装设计+溯源二维码',
                    '一体成型无胶自锁盒+盲文压印',
                    '纸质拉链袋+数字水印',
                ];
                const selectedEco = concept.eco || ecoOptions[index % ecoOptions.length];

                // 构建独特提示词
                let prompt = `包装设计提案效果图，专业产品摄影级多视图陈列，`;
                prompt += `构图包含正面主视图（居中C位占比45%）、45°俯视立体视角（右侧占比30%）、侧面结构展示（左侧占比25%），`;
                prompt += `高档影棚纯色微水泥台面，三视图整齐排列，柔和投影与精准高光，8K超高清，C4D渲染，Octane渲染器，产品级精修质感——`;
                prompt += `【概念】${concept.name}：${concept.feature}；`;
                prompt += `【行业】${userIndustry}；【结构】${concept.structure || userStructure}；`;
                prompt += `【材质】${concept.material || userMaterial}；【工艺】${userCraft}；`;
                prompt += `【风格】${userStyle}；【色彩】${userColor}；【视觉】${userVisual}；`;
                prompt += `【环保】${selectedEco}；`;
                if (userSize) prompt += `【尺寸】${userSize}；`;
                prompt += `【体验】${userExp}；【展示】${userDisplay}；`;
                prompt += `【AI要素】${userAI}——`;
                prompt += `高品质产品摄影布光，柔光箱加侧逆光，空气感微尘，博物馆级展陈质感，极致细节，包装设计获奖作品级画面。`;

                generatedPromptsCache.push({
                    conceptName: concept.name,
                    fullPrompt: prompt,
                    index: index
                });
            });

            updatePromptsDisplay();
            showToast('✅ 已生成20组不重复提示词！每组可展开查看并复制');
            // 滚动到提示词区域顶部
            document.getElementById('promptsScrollArea').scrollTop = 0;
        }

        function copySinglePrompt(index, btnElement) {
            if (index >= 0 && index < generatedPromptsCache.length) {
                const text = generatedPromptsCache[index].fullPrompt;
                copyToClipboard(text, btnElement);
            }
        }

        function copyToClipboard(text, btnElement) {
            if (navigator.clipboard && navigator.clipboard.writeText) {
                navigator.clipboard.writeText(text).then(() => {
                    if (btnElement) {
                        btnElement.classList.add('copied');
                        btnElement.textContent = '✅ 已复制';
                        setTimeout(() => {
                            btnElement.classList.remove('copied');
                            btnElement.textContent = '📋 复制此条';
                        }, 1800);
                    }
                    showToast('📋 提示词已复制到剪贴板');
                }).catch(() => fallbackCopy(text, btnElement));
            } else {
                fallbackCopy(text, btnElement);
            }
        }

        function fallbackCopy(text, btnElement) {
            const ta = document.createElement('textarea');
            ta.value = text;
            ta.style.position = 'fixed';
            ta.style.left = '-9999px';
            document.body.appendChild(ta);
            ta.select();
            try { document.execCommand('copy'); } catch (e) {}
            document.body.removeChild(ta);
            if (btnElement) {
                btnElement.classList.add('copied');
                btnElement.textContent = '✅ 已复制';
                setTimeout(() => {
                    btnElement.classList.remove('copied');
                    btnElement.textContent = '📋 复制此条';
                }, 1800);
            }
            showToast('📋 已复制');
        }

        function showToast(msg) {
            const toast = document.getElementById('toast');
            toast.textContent = msg;
            toast.classList.add('show');
            clearTimeout(toast._timeout);
            toast._timeout = setTimeout(() => toast.classList.remove('show'), 2000);
        }

        // ==================== 启动 ====================
        init();
        renderSubcategories('行业包装分类');
    </script>
</body>
</html>
